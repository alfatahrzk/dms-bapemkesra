<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Dokumen - DMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="app-container">
        <div id="sidebar-container"></div>

        <div id="content" class="main-content">
            <div id="navbar-container"></div>

            <div class="content-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h3 id="page-title" class="fw-bold text-dark m-0">Memuat Dokumen...</h3>
                        <small class="text-muted">Kelola metadata dan arsip dokumen internal</small>
                    </div>
                    <a href="./add-document.html" class="btn btn-primary fw-semibold px-3 btn-sm">
                        <i class="bi bi-plus-lg me-1"></i> Tambah Baru
                    </a>
                </div>

                <div class="card shadow-sm border-0 p-3 mb-4 rounded-3">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <input type="text" id="search-input" class="form-control form-control-sm" placeholder="Cari nomor surat atau asal surat...">
                        </div>
                        <div class="col-6 col-md-2">
                            <select id="filter-type" class="form-select form-select-sm">
                                <option value="">- Semua Jenis -</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-2">
                            <select id="filter-nature" class="form-select form-select-sm">
                                <option value="">- Semua Sifat -</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-2">
                            <select id="filter-month" class="form-select form-select-sm">
                                <option value="">- Semua Bulan -</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-2">
                            <button id="btn-reset-filter" class="btn btn-outline-secondary btn-sm w-100 fw-semibold">
                                Reset Filter
                            </button>
                        </div>
                    </div>
                    <div class="row g-2 mt-2 pt-2 border-top border-light">
                        <div class="col-6 col-md-3 d-flex align-items-center">
                            <label class="small text-muted me-2 text-nowrap">Rentang:</label>
                            <input type="date" id="filter-start-date" class="form-control form-control-sm">
                        </div>
                        <div class="col-6 col-md-3 d-flex align-items-center">
                            <label class="small text-muted me-2 text-nowrap">s/d</label>
                            <input type="date" id="filter-end-date" class="form-control form-control-sm">
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0 rounded-3">
                    <div id="table-loading" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="text-muted mt-2 small">Menyinkronkan data berkas...</p>
                    </div>

                    <div id="table-wrapper" class="d-none">
                        <div class="table-responsive-container">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light small text-uppercase">
                                    <tr>
                                        <th class="ps-4">Create Date</th>
                                        <th>Asal Surat</th>
                                        <th>Nomor Surat</th>
                                        <th>Tanggal Surat</th>
                                        <th>Jenis</th>
                                        <th>Sifat</th>
                                        <th class="text-center pe-4" style="width: 200px;">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="docs-tbody" class="small">
                                    </tbody>
                            </table>
                        </div>

                        <div class="card-footer bg-white d-flex flex-column flex-sm-row justify-content-between align-items-center py-3 border-0">
                            <small class="text-muted mb-2 mb-sm-0" id="pagination-info">Menampilkan 0 dari 0 data</small>
                            <div id="pagination-container"></div>
                        </div>
                    </div>
                </div> </div>
        </div>
    </div>

    <script type="module" src="../assets/js/documents.js"></script>
</body>
</html>
