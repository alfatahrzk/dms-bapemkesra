<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="app-container">
        <div id="sidebar-container"></div>

        <div id="content" class="main-content">
            <div id="navbar-container"></div>

            <div class="content-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-dark m-0">Ringkasan Sistem</h3>
                    <a href="./add-document.html" class="btn btn-primary fw-semibold small px-3">
                        <i class="bi bi-plus-lg me-1"></i> Tambah Dokumen
                    </a>
                </div>

                <div id="dashboard-loading" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="text-muted mt-2 small">Memuat metrik & data terbaru...</p>
                </div>

                <div id="dashboard-main-content" class="d-none">
                    <div class="row g-3 mb-4">
                        <div class="col-6 col-lg-3">
                            <div class="card stat-card shadow-sm p-3 bg-white border-start border-primary border-4">
                                <small class="text-muted fw-semibold">TOTAL DOKUMEN</small>
                                <h2 id="stat-total-docs" class="fw-bold text-dark my-1">-</h2>
                            </div>
                        </div>
                        <div class="col-6 col-lg-3">
                            <div class="card stat-card shadow-sm p-3 bg-white border-start border-success border-4">
                                <small class="text-muted fw-semibold">JENIS SURAT</small>
                                <h2 id="stat-total-types" class="fw-bold text-dark my-1">-</h2>
                            </div>
                        </div>
                        <div class="col-6 col-lg-3">
                            <div class="card stat-card shadow-sm p-3 bg-white border-start border-warning border-4">
                                <small class="text-muted fw-semibold">SIFAT SURAT</small>
                                <h2 id="stat-total-natures" class="fw-bold text-dark my-1">-</h2>
                            </div>
                        </div>
                        <div class="col-6 col-lg-3">
                            <div class="card stat-card shadow-sm p-3 bg-white border-start border-info border-4">
                                <small class="text-muted fw-semibold">KATEGORI</small>
                                <h2 id="stat-total-categories" class="fw-bold text-dark my-1">-</h2>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-header bg-white border-bottom py-3 px-4">
                            <h5 class="fw-bold text-dark m-0">5 Dokumen Terbaru</h5>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 px-3">
                                <thead class="table-light small text-uppercase">
                                    <tr>
                                        <th class="ps-4">Create Date</th>
                                        <th>Asal Surat</th>
                                        <th>Nomor Surat</th>
                                        <th>Tanggal Surat</th>
                                        <th>Jenis</th>
                                        <th>Sifat</th>
                                        <th class="text-center pe-4">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="recent-docs-tbody" class="small">
                                    </tbody>
                            </table>
                        </div>
                    </div>

                </div> </div>
        </div>
    </div>

    <script type="module" src="../assets/js/dashboard.js"></script>
</body>
</html>
