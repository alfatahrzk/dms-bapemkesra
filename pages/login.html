<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BAPEMKESRA Surabaya</title>
    <link rel="icon" type="image/png" href="../assets/images/surabaya-logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4 col-xl-4">
                
                <div class="card shadow-sm p-4 p-sm-5" style="border-radius: var(--radius-lg); background-color: #ffffff;">
                    <div class="text-center mb-4">
                        <img src="../assets/images/surabaya-logo.png" alt="Logo Kota Surabaya" class="mb-3" style="height: 100px; width: auto; object-fit: contain;">
                        
                        <div class="d-flex flex-column gap-1" style="line-height: 1.3;">
                            <h6 class="fw-bold text-dark m-0 px-2" style="font-size: 20px;">
                                Bagian Pemerintahan dan Kesejahteraan Rakyat
                            </h6>
                            <span class="text-muted fw-medium" style="font-size: 15px;">
                                Sekretariat Kota Surabaya
                            </span>
                        </div>
                    </div>
                    
                    <div id="alert-container"></div>

                    <form id="login-form" class="mt-3">
                        <div class="mb-3">
                            <label Custom for="email" class="form-label small fw-semibold text-secondary mb-1">Email Administrator</label>
                            <input type="email" class="form-control" id="email" required placeholder="admin@surabaya.go.id">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-semibold text-secondary mb-1">Kata Sandi</label>
                            <input type="password" class="form-control" id="password" required placeholder="••••••••">
                        </div>
                        <button type="submit" id="btn-login" class="btn btn-primary w-100 py-2 fw-semibold d-flex align-items-center justify-content-center gap-2" style="font-size: 14px;">
                            <span id="btn-text">Masuk ke Aplikasi</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                </div>

                <div class="text-center mt-4">
                    <small class="text-muted" style="font-size: 11px;">DMS Bapemkesra &copy; 2026 Pemerintah Kota Surabaya</small>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
